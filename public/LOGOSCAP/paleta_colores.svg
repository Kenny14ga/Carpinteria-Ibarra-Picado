<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="360" viewBox="0 0 1300 360" role="img" aria-label="Carpintería Ibarra Picado">
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6D3B1"/>
      <stop offset="45%" stop-color="#C89A5B"/>
      <stop offset="100%" stop-color="#8B5E34"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A2E20"/>
      <stop offset="100%" stop-color="#8B5E34"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#F7F4EF"/>
  <text x="60" y="70" font-family="Montserrat, Arial, sans-serif" font-size="34" letter-spacing="3" fill="#4A2E20">PALETA DE COLORES</text>

  <rect x="60" y="110" width="180" height="130" rx="18" fill="#4A2E20" stroke="#D8C7B2" stroke-width="2"/>
  <text x="150" y="285" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#4A2E20">NOGAL OSCURO</text>
  <text x="150" y="322" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#8B5E34">#4A2E20</text>

  <rect x="300" y="110" width="180" height="130" rx="18" fill="#8B5E34" stroke="#D8C7B2" stroke-width="2"/>
  <text x="390" y="285" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#4A2E20">CEDRO</text>
  <text x="390" y="322" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#8B5E34">#8B5E34</text>

  <rect x="540" y="110" width="180" height="130" rx="18" fill="#C89A5B" stroke="#D8C7B2" stroke-width="2"/>
  <text x="630" y="285" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#4A2E20">ROBLE MIEL</text>
  <text x="630" y="322" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#8B5E34">#C89A5B</text>

  <rect x="780" y="110" width="180" height="130" rx="18" fill="#E6D3B1" stroke="#D8C7B2" stroke-width="2"/>
  <text x="870" y="285" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#4A2E20">BEIGE ARENA</text>
  <text x="870" y="322" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#8B5E34">#E6D3B1</text>

  <rect x="1020" y="110" width="180" height="130" rx="18" fill="#F7F4EF" stroke="#D8C7B2" stroke-width="2"/>
  <text x="1110" y="285" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#4A2E20">CREMA</text>
  <text x="1110" y="322" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="24" fill="#8B5E34">#F7F4EF</text>
</svg>